{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Error{% endblock %} - Tango Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 25% 20%, rgba(37, 99, 235, 0.08), transparent 44%),
                radial-gradient(circle at 80% 80%, rgba(225, 29, 72, 0.07), transparent 38%),
                #f8fafc;
        }
        .error-card {
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.12);
        }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card error-card">
                <div class="card-body p-4 p-md-5 text-center">
                    <div class="display-6 fw-bold mb-2">{% block code %}Error{% endblock %}</div>
                    <h1 class="h3 mb-3">{% block heading %}Something went wrong{% endblock %}</h1>
                    <p class="text-muted mb-4">{% block message %}Please try again later.{% endblock %}</p>
                    <a href="/finance/" class="btn btn-primary">Return to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
