<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Tango Finance</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        .error-msg { color: red; margin-bottom: 10px; }
        input { padding: 8px; width: 250px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Login to Tango Finance</h2>

    {% if form.errors %}
        <p class="error-msg">Invalid email or password. Please try again.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div>
            <label for="id_username">Email Address:</label><br>
            <input type="email" name="username" id="id_username" required autofocus>
        </div>
        <br>
        <div>
            <label for="id_password">Password:</label><br>
            <input type="password" name="password" id="id_password" required>
        </div>
        <br>
        <button type="submit">Sign In</button>
    </form>

    <p>Don't have an account? <a href="{% url 'finance:register' %}">Register here</a></p>
</body>
</html>
